name: CI-K8 manifest check
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  ci:
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: /home/vagrant/python-pg-connection/k8s
      - name: dry run
        working-directory: /home/vagrant/python-pg-connection
        run: kubectl apply --dry-run=server -f k8s/ -n dev-test

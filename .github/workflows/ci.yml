name: CI-K8 manifest check
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  ci:
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: k8s
      - name: dry run
        run: kubectl apply --dry-run=server -f $GITHIB_WORKSPACE/k8s/ -n dev-test
